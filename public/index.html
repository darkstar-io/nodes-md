<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 class="app-title">Notes</h1>
        <button id="btn-new" class="btn btn-primary">+ New</button>
      </div>
      <div class="search-wrap">
        <input
          id="search-input"
          type="search"
          placeholder="Search notes..."
          aria-label="Search notes"
        />
      </div>
      <ul id="notes-list" class="notes-list" role="list"></ul>
      <p id="empty-state" class="empty-state hidden">No notes yet. Create one!</p>
      <p id="no-results" class="empty-state hidden">No notes match your search.</p>
    </aside>

    <main class="content">
      <div id="load-error" class="form-error hidden" role="alert"></div>

      <div id="placeholder" class="placeholder">
        <p>Select a note to view it, or create a new one.</p>
      </div>

      <article id="note-view" class="note-view hidden">
        <div class="note-view-header">
          <h2 id="note-title" class="note-title"></h2>
          <div class="note-actions">
            <button id="btn-edit" class="btn btn-secondary">Edit</button>
            <button id="btn-delete" class="btn btn-danger">Delete</button>
          </div>
        </div>
        <p id="note-meta" class="note-meta"></p>
        <div id="note-body" class="note-body prose"></div>
      </article>

      <section id="note-form" class="note-form hidden">
        <h2 id="form-title" class="form-heading"></h2>
        <div id="form-error" class="form-error hidden"></div>
        <div class="form-group">
          <label for="input-title">Title <span aria-hidden="true">*</span></label>
          <input id="input-title" type="text" placeholder="Note title" />
        </div>
        <div class="form-group">
          <label for="input-content">Content (Markdown)</label>
          <textarea id="input-content" rows="18" placeholder="Write your note in markdown..."></textarea>
        </div>
        <div class="form-actions">
          <button id="btn-save" class="btn btn-primary">Save</button>
          <button id="btn-cancel" class="btn btn-secondary">Cancel</button>
        </div>
      </section>
    </main>
  </div>

  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"
    integrity="sha512-pmjEJQ7CveksANaAKdCJZMig7eAcCFFzE1b5XnlnxdB/vU3AOStJ5SF7w4tFuqskuU31ETnAaWTYRQOYg2WHKw=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"
    integrity="sha512-H+rglffZ6f5gF7UJgvH4Naa+fGCgjrHKMgoFOGmcPTRwR6oILo5R+gtzNrpDp7iMV3udbymBVjkeZGNz1Em4rQ=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>
  <script src="/js/app.js"></script>
</body>
</html>
